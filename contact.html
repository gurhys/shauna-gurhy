<!DOCTYPE html>
<html lang="en">

    </head>

    <body class="resume-page contact-page">
        <nav class="site-nav" aria-label="Main navigation">
            <a class="site-nav-brand" href="./index.html">Shauna Gurhy</a>
            <button
                class="site-nav-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="site-nav-links"
                aria-label="Open navigation"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="site-nav-links" id="site-nav-links">
                <a href="./index.html">Home</a>
                <a href="./about.html">About</a>
                <a href="./contact.html">Contact</a>
                <a href="./education.html">Education</a>
                <a href="./workexperience.html">Work Experience</a>
                <a href="./adventure.html">Adventure</a>
                <a href="./skills_abilities.html">Skills</a>
                <a href="./creativity.html">Creativity</a>
                <a href="#">Portfolio</a>
                <a href="./blog.html">Blog</a>
            </div>
        </nav>

        <main class="page-shell">
            <section class="section contact-page-section">
                <div class="contact-simple">
                    <div class="contact-heading-row">
                        <span class="contact-heading-line" aria-hidden="true"></span>
                        <h1>Contact</h1>
                        <span class="contact-heading-line" aria-hidden="true"></span>
                    </div>
                    <p class="contact-name">Shauna Gurhy</p>
                    <p class="contact-role">BAI Electronic and Computer Engineering</p>
                    <div class="contact-details">
                        <p><span>Email</span> <a href="mailto:shaunagurhy@gmail.com">shaunagurhy@gmail.com</a></p>
                        <p><span>Phone</span> <a href="tel:+353872075305">+353 872075305</a></p>
                        <p><span>Location</span> Dublin, Ireland</p>
                        <p><span>LinkedIn</span> <a href="https://www.linkedin.com/in/shauna-gurhy-0735a4173/">shauna-gurhy-0735a4173</a></p>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const siteNav = document.querySelector(".site-nav");
            const navToggle = document.querySelector(".site-nav-toggle");
            const navLinks = document.querySelector(".site-nav-links");

            if (siteNav && navToggle && navLinks) {
                function setNavState(isOpen) {
                    siteNav.classList.toggle("is-open", isOpen);
                    navToggle.setAttribute("aria-expanded", isOpen.toString());
                    navToggle.setAttribute("aria-label", isOpen ? "Close navigation" : "Open navigation");
                }

                navToggle.addEventListener("click", () => {
                    const isOpen = navToggle.getAttribute("aria-expanded") !== "true";
                    setNavState(isOpen);
                });

                navLinks.querySelectorAll("a").forEach((link) => {
                    link.addEventListener("click", () => {
                        if (window.innerWidth <= 900) {
                            setNavState(false);
                        }
                    });
                });

                window.addEventListener("resize", () => {
                    if (window.innerWidth > 900) {
                        setNavState(false);
                    }
                });
            }
        </script>
    </body>
</html>
